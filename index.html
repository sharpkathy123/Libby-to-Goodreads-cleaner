<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Libby CSV Cleaner</title>
    <style>
        :root { --accent: #377458; --bg: #f4f7f6; }
        body { font-family: -apple-system, sans-serif; background: var(--bg); display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; padding: 20px; box-sizing: border-box; }
        .card { background: white; padding: 2rem; border-radius: 16px; box-shadow: 0 8px 30px rgba(0,0,0,0.1); width: 100%; max-width: 400px; text-align: center; }
        h2 { color: var(--accent); margin-bottom: 20px; }
        input[type="file"] { width: 100%; margin-bottom: 20px; }
        button { width: 100%; background: var(--accent); color: white; border: none; padding: 15px; border-radius: 8px; font-size: 1rem; font-weight: bold; cursor: pointer; }
        #status { margin-top: 15px; font-weight: bold; color: #2e7d32; }
        .next-step { margin-top: 20px; display: none; padding: 15px; background: #e8f5e9; border-radius: 8px; text-decoration: none; color: #1b5e20; font-weight: bold; border: 1px solid #c8e6c9; }
    </style>
</head>
<body>

<div class="card">
    <h2>Libby Cleaner</h2>
    <input type="file" id="fileInput" accept=".csv">
    <button onclick="processCSV()">Clean & Save File</button>
    
    <div id="status"></div>
    
    <a id="goodreadsLink" href="https://www.goodreads.com/review/import" target="_blank" class="next-step">
        Step 2: Upload to Goodreads →
    </a>
</div>

<script>
function processCSV() {
    const fileInput = document.getElementById('fileInput');
    const status = document.getElementById('status');
    const grLink = document.getElementById('goodreadsLink');
    
    if (!fileInput.files[0]) return alert("Please select a file.");

    const reader = new FileReader();
    reader.onload = function(e) {
        const text = e.target.result;
        const rows = text.split(/\r?\n/).filter(row => row.trim() !== "");
        
        const rawHeaders = rows[0].split(',');
        const coverIdx = rawHeaders.findIndex(h => h.replace(/["']/g, "").trim().toLowerCase() === 'cover');
        const timestampIdx = rawHeaders.findIndex(h => h.replace(/["']/g, "").trim().toLowerCase() === 'timestamp');

        const cleanedRows = rows.map((row, rowIndex) => {
            let cols = row.split(',');
            if (rowIndex === 0 && timestampIdx !== -1) cols[timestampIdx] = "Date Read";

            if (coverIdx !== -1) {
                return cols.filter((_, colIdx) => colIdx !== coverIdx).join(',');
            }
            return cols.join(',');
        });

        const finalCsv = cleanedRows.join('\n');
        const blob = new Blob([finalCsv], { type: 'text/csv;charset=utf-8;' });
        const link = document.createElement("a");
        link.setAttribute("href", URL.createObjectURL(blob));
        link.setAttribute("download", "libby_cleaned.csv");
        link.click();
        
        status.innerText = "✓ Cleaned file saved!";
        grLink.style.display = "block"; // Show the Goodreads button
    };
    reader.readAsText(fileInput.files[0]);
}
</script>

</body>
</html>
