<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Libby Export Cleaner</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.3.2/papaparse.min.js"></script>
    <style>
        body { font-family: sans-serif; background: #f0f2f5; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .card { background: white; padding: 30px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); width: 100%; max-width: 400px; text-align: center; }
        h2 { color: #2c3e50; margin-bottom: 20px; }
        .file-input { margin-bottom: 20px; border: 2px dashed #cbd5e0; padding: 20px; border-radius: 8px; cursor: pointer; }
        button { background: #4a90e2; color: white; border: none; padding: 12px 24px; border-radius: 6px; font-weight: bold; cursor: pointer; transition: 0.2s; width: 100%; }
        button:hover { background: #357abd; }
        .status { margin-top: 15px; font-size: 0.9rem; color: #666; }
    </style>
</head>
<body>

<div class="card">
    <h2>Libby Export Cleaner</h2>
    <p>Upload your Libby CSV to remove extra columns and rename the timestamp.</p>
    
    <input type="file" id="libbyFile" accept=".csv" class="file-input">
    
    <button onclick="cleanLibbyData()">Clean & Save File</button>
    
    <div id="status" class="status"></div>
</div>

<script>
function cleanLibbyData() {
    const fileInput = document.getElementById('libbyFile');
    const status = document.getElementById('status');

    if (!fileInput.files[0]) {
        alert("Please select a Libby CSV file first.");
        return;
    }

    Papa.parse(fileInput.files[0], {
        header: true,
        skipEmptyLines: true,
        complete: function(results) {
            let data = results.data;
            
            // Transform the data
            const cleanedData = data.map(row => {
                // 1. Create a copy of the row
                let newRow = { ...row };
                
                // 2. Remove "Cover" and "Library" (case-insensitive check)
                delete newRow['Cover'];
                delete newRow['cover'];
                delete newRow['Library'];
                delete newRow['library'];
                
                // 3. Change "Timestamp" to "Date Read"
                if (newRow.hasOwnProperty('Timestamp')) {
                    newRow['Date Read'] = newRow['Timestamp'];
                    delete newRow['Timestamp'];
                } else if (newRow.hasOwnProperty('timestamp')) {
                    newRow['Date Read'] = newRow['timestamp'];
                    delete newRow['timestamp'];
                }
                
                return newRow;
            });

            // Convert back to CSV
            const finalCsv = Papa.unparse(cleanedData);
            
            // Trigger Download
            downloadFile(finalCsv);
            status.innerText = "Processing complete! Your file has been saved.";
        }
    });
}

function downloadFile(csvContent) {
    const blob = new Blob([csvContent], { type: 'text/csv;charset=utf-8;' });
    const url = URL.createObjectURL(blob);
    const link = document.createElement("a");
    link.setAttribute("href", url);
    link.setAttribute("download", "cleaned_libby_export.csv");
    document.body.appendChild(link);
    link.click();
    document.body.removeChild(link);
}
</script>

</body>
</html>
